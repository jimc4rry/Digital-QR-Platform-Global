name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  django-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: menu-platform
    env:
      SECRET_KEY: ci-test-secret-key
      DEBUG: "False"
      ALLOWED_HOSTS: localhost,127.0.0.1
      # Django's test client doesn't simulate HTTPS, so with DEBUG=False the
      # production SECURE_SSL_REDIRECT setting would 301 every test request.
      SECURE_SSL_REDIRECT: "False"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: menu-platform/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Django checks
        run: python manage.py check

      - name: Run tests
        run: python manage.py test

  flutter-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile_app
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Run tests
        run: flutter test
