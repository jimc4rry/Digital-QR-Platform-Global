{% extends 'base.html' %}
{% load crispy_forms_tags i18n %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-4">
            <div class="card shadow">
                <div class="card-header bg-primary text-white">
                    <h3 class="mb-0">{% trans "Σύνδεση" %}</h3>
                </div>
                <div class="card-body">
                    <form method="post">
                        {% csrf_token %}
                        {{ form|crispy }}
                        <button type="submit" class="btn btn-primary w-100 mt-3">{% trans "Σύνδεση" %}</button>
                    </form>
                    <div class="mt-3 text-center">
                        <a href="{% url 'signup' %}">{% trans "Δεν έχεις λογαριασμό; Εγγράψου" %}</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
