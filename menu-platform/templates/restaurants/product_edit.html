{% extends 'base.html' %}
{% load crispy_forms_tags i18n %}

{% block content %}
<div class="container py-4">
    <h1>{% trans "Επεξεργασία Προϊόντος" %}</h1>
    <div class="row">
        <div class="col-md-8">
            <div class="card">
                <div class="card-body">
                    <form method="post" enctype="multipart/form-data">
                        {% csrf_token %}
                        {{ form|crispy }}
                        <button type="submit" class="btn btn-primary">{% trans "Αποθήκευση" %}</button>
                        <a href="{% url 'product_list' %}" class="btn btn-secondary">{% trans "Πίσω" %}</a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
