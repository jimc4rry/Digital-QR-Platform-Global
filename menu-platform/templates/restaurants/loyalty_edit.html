{% extends 'base.html' %}
{% load crispy_forms_tags i18n %}

{% block title %}{% trans "Επεξεργασία Loyalty" %} - {{ restaurant.name }}{% endblock %}

{% block content %}
<div class="container py-4">
    <h1>{% trans "Επεξεργασία Λογαριασμού Loyalty" %}</h1>
    <div class="row">
        <div class="col-md-6">
            <div class="card">
                <div class="card-body">
                    <form method="post">
                        {% csrf_token %}
                        {{ form|crispy }}
                        <button type="submit" class="btn btn-primary">{% trans "Αποθήκευση" %}</button>
                        <a href="{% url 'loyalty_list' %}" class="btn btn-secondary">{% trans "Πίσω" %}</a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
