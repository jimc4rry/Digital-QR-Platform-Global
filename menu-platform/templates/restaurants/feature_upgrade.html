{% extends 'base.html' %}
{% load i18n %}

{% block title %}{{ feature_title }} - {{ restaurant.name }}{% endblock %}

{% block content %}
<div class="container py-5 text-center">
    <i class="bi {{ feature_icon }} display-1 text-primary"></i>
    <h1 class="mt-3">{{ feature_title }}</h1>
    <p class="lead text-muted">{{ feature_description }}</p>
    <a href="{% url 'home' %}#pricing" class="btn btn-primary btn-lg mt-3">{% trans "View Plans" %}</a>
</div>
{% endblock %}
